spring.application.name=medzoo-backend
server.port=5001

# MongoDB Connection
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/medzoo}
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:medzoo_super_secret_key_2026_java}
app.jwt.expiration=2592000000

# CORS — Frontend dev server
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.medzoo=DEBUG
logging.level.org.springframework.security=WARN
